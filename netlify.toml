# Netlify configuration for the MB Storage site
# Static site served from the repo root; the quote handler runs as a function.

[build]
  publish = "."
  functions = "netlify/functions"

# Node 18+ gives the built-in fetch() used by the quote function
[functions]
  node_bundler = "esbuild"

# Hourly: mark freshly-paid QuickBooks invoices in the Invoice Check sheet
[functions."qb-paid-sync"]
  schedule = "0 * * * *"

# Daily 8am UTC: quote follow-up emails + warm-leads WhatsApp digest
[functions."quote-followup"]
  schedule = "0 8 * * *"

# Daily 9am UTC: Google review requests ~14 days after move-in
[functions."review-request"]
  schedule = "0 9 * * *"

# Daily 10am UTC: publish the next scheduled Facebook/Instagram post
[functions."social-post"]
  schedule = "0 10 * * *"

# Daily 11am UTC: SMS reminder for invoices overdue by REMINDER_DAYS_AFTER_DUE days
[functions."payment-reminders"]
  schedule = "0 11 * * *"
